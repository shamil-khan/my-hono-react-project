name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:

  # ── JOB 1: BUILD BOTH APPS ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter api run build        # wrangler build → dist/index.js

      - name: Build Web
        run: pnpm --filter web run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }} # baked into JS here ✅

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          retention-days: 1
          path: |
            apps/api/dist
            apps/web/dist

  # ── JOB 2: TERRAFORM (runs only if build passes) ────────────────────
  infra:
    name: Infra
    runs-on: ubuntu-latest
    needs: build
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}  # Terraform Cloud auth
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
        # No import step — state lives in Terraform Cloud ✅

  # ── JOB 3: DEPLOY BOTH (runs only if infra passes) ──────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, infra]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: apps

      - name: Deploy API
        run: cd apps/api && npx wrangler deploy dist/index.js
        # Points directly to pre-built file → no rebuild ✅

      - name: Deploy Web
        run: npx wrangler pages deploy apps/web/dist --project-name my-hono-react-web
        # Deploys pre-built dist/ folder → no rebuild ✅