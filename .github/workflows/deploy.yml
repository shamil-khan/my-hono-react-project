name: Deploy Monorepo

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # JOB 1: Ensure Infra is ready (Optional: only run if terraform/ changes)
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Terraform Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # JOB 2: Build and Deploy (Scalable approach)
  deploy:
    needs: terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            path: ./apps/api
            command: pnpm run deploy # Wrangler deploy
          - name: web
            path: ./apps/web
            command: pnpm run deploy # Wrangler pages deploy
    
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: 'pnpm' }
        
      - name: Install & Build
        run: pnpm install
        
      - name: Deploy ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.command }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Inject build-time vars here
          VITE_API_URL: ${{ vars.VITE_API_URL }}
