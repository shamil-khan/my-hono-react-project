name: Deploy Infrastructure
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: pnpm install

      # THIS STEP IS CRITICAL: It creates the file Terraform is looking for
      - name: Build API and Web
        run: |
          cd apps/api && pnpm run build
          cd ../web && pnpm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Discover and Import Existing Resources
        run: |
          # 1. Check and Import Pages Frontend
          terraform import cloudflare_pages_project.frontend ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/my-hono-react-web || echo "Pages already in state or not found"
          
          # 2. Check and Import Hono API Worker
          terraform import cloudflare_workers_script.api ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/my-hono-api || echo "Worker already in state or not found"
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Build Web Frontend
        run: cd apps/web && pnpm run build

      - name: Deploy API to Cloudflare Workers
        run: pnpm run deploy --project-name my-hono-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}        

      - name: Deploy Frontend to Cloudflare Pages
        run: npx wrangler pages deploy apps/web/dist --project-name my-hono-react-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}        
