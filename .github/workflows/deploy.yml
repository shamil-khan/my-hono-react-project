name: Deploy Infrastructure
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_URL: ${{ vars.VITE_API_URL }}  

    strategy:
      fail-fast: true # Your services are interdependent, so if one fails, we should stop the others
      matrix:
        include:
          - name: backend
            path: ./apps/api
            deploy_cmd: pnpm run deploy
          - name: frontend
            path: ./apps/web
            deploy_cmd: pnpm run deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # THIS STEP IS CRITICAL: It creates the file Terraform is looking for
      - name: Build API and Web
        run: |
          cd apps/api && pnpm run build
          cd ../web && pnpm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Discover and Import Existing Resources
        run: |
          terraform import cloudflare_pages_project.frontend ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/my-hono-react-web || echo "Pages already in state or not found"
          terraform import cloudflare_workers_script.api ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/my-hono-api || echo "Worker already in state or not found"
        working-directory: ./terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
        working-directory: ./terraform

      - name: Deploy ${{ matrix.name }}
        working-directory: ${{ matrix.path }}
        run: ${{ matrix.deploy_cmd }}
        
