name = "my-hono-api"
main = "src/index.ts"
compatibility_date = "2026-02-28"
compatibility_flags = [ "nodejs_compat" ]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
ALLOWED_ORIGIN = "https://my-hono-react-web.pages.dev"